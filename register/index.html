<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Акаунт — MODE</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">MODE</a>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="../index.html" class="nav-link">Головна</a></li>
          <li><a href="../catalog/index.html" class="nav-link">Каталог</a></li>
          <li><a href="index.html" class="nav-link active">Реєстрація</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <h1 class="page-title">Акаунт</h1>
      <p class="page-sub">Доєднуйтесь до нашої спільноти</p>
    </section>

    <section class="register-section">
      <div class="register-layout">
        
        <div class="register-form-wrap">
          <h2 class="form-heading">Створити акаунт</h2>
          <form class="register-form">
            <fieldset class="form-group">
              <div class="field-wrap">
                <label for="name" class="field-label">Ім'я та прізвище</label>
                <input type="text" id="name" class="field-input" placeholder="Олена Ковальчук" required />
              </div>
              <div class="field-wrap">
                <label for="email" class="field-label">Email</label>
                <input type="email" id="email" class="field-input" placeholder="example@email.com" required />
              </div>
              <div class="field-wrap">
                <label for="tel" class="field-label">Телефон</label>
                <input type="tel" id="tel" class="field-input" placeholder="+380XXXXXXXXX" pattern="\+380[0-9]{9}" required />
              </div>
              <div class="field-wrap">
                <label for="password" class="field-label">Створіть пароль</label>
                <input type="password" id="password" class="field-input" placeholder="********" required />
              </div>
            </fieldset>

            <fieldset class="form-group">
              <legend class="form-legend">Ваші інтереси</legend>
              <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" name="interest" value="dresses" /> Сукні</label>
                <label class="checkbox-label"><input type="checkbox" name="interest" value="shirts" /> Сорочки</label>
                <label class="checkbox-label"><input type="checkbox" name="interest" value="tshirts" /> Футболки</label>
              </div>
            </fieldset>

            <button type="submit" class="btn-primary">Зареєструватись</button>
          </form>
        </div>

        <aside class="register-form-wrap" id="login-box" style="margin-top: 50px;">
          <h2 class="form-heading">Вхід</h2>
          <form class="register-form">
            <div class="field-wrap">
              <label for="login-email" class="field-label">Email</label>
              <input type="email" id="login-email" class="field-input" placeholder="example@email.com" required />
            </div>
            <div class="field-wrap">
              <label for="login-pass" class="field-label">Пароль</label>
              <input type="password" id="login-pass" class="field-input" placeholder="********" required />
            </div>
            <button type="submit" class="btn-primary">Увійти</button>
          </form>
        </aside>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-logo">MODE</p>
      <nav>
        <ul class="footer-nav">
          <li><a href="../index.html">Головна</a></li>
          <li><a href="../catalog/index.html">Каталог</a></li>
          <li><a href="index.html">Реєстрація</a></li>
        </ul>
      </nav>
      <p class="footer-copy">&copy; 2025 MODE. Всі права захищено.</p>
    </div>
  </footer>

</body>
</html>
