<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Створіть свій особистий акаунт у MODE." />
  <meta name="author" content="Влада Гіренко" />
  <title>Акаунт — MODE</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">MODE</a>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="../index.html" class="nav-link">Головна</a></li>
          <li><a href="../catalog/index.html" class="nav-link">Каталог</a></li>
          <li><a href="index.html" class="nav-link active">Реєстрація</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <h1 class="page-title">Акаунт</h1>
      <p class="page-sub">Приєднуйтесь до нашої спільноти</p>
    </section>
    <section class="register-section">
      <div class="register-layout">
        <div class="register-form-wrap">
          <h2 class="form-heading">Створити акаунт</h2>
          <form class="register-form" action="#" method="post">
            <fieldset class="form-group">
              <div class="field-wrap">
                <label for="name" class="field-label">Ім'я</label>
                <input type="text" id="name" class="field-input" placeholder="Олена Ковальчук" required minlength="2" />
              </div>
              <div class="field-wrap">
                <label for="email" class="field-label">Email</label>
                <input type="email" id="email" class="field-input" placeholder="example@email.com" required />
              </div>
              <div class="field-wrap">
                <label for="tel" class="field-label">Телефон</label>
                <input type="tel" id="tel" class="field-input" placeholder="+380XXXXXXXXX" pattern="\+380[0-9]{9}" required />
              </div>
              <div class="field-wrap">
                <label for="social" class="field-label">Instagram/TikTok (URL)</label>
                <input type="url" id="social" class="field-input" placeholder="https://instagram.com/username" />
              </div>
              <div class="field-wrap">
                <label for="visit" class="field-label">Дата візиту</label>
                <input type="datetime-local" id="visit" class="field-input" required />
              </div>
              <div class="field-wrap">
                <label for="pass" class="field-label">Пароль</label>
                <input type="password" id="pass" class="field-input" placeholder="********" required minlength="8" />
              </div>
            </fieldset>
            <button type="submit" class="btn-primary">Зареєструватись</button>
          </form>
        </div>
        <aside class="register-form-wrap" id="login-box" style="margin-top: 50px;">
          <h2 class="form-heading">Вхід</h2>
          <form class="register-form">
            <div class="field-wrap">
              <label for="l-email" class="field-label">Email</label>
              <input type="email" id="l-email" class="field-input" required />
            </div>
            <div class="field-wrap">
              <label for="l-pass" class="field-label">Пароль</label>
              <input type="password" id="l-pass" class="field-input" required />
            </div>
            <button type="submit" class="btn-primary">Увійти</button>
          </form>
        </aside>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-logo">MODE</p>
      <p class="footer-copy">© 2025 MODE. Всі права захищено.</p>
    </div>
  </footer>
</body>
</html>
