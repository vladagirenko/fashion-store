<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Створіть свій особистий акаунт у MODE." />
  <meta name="author" content="Влада Гіренко" />
  <title>Акаунт — MODE</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="../index.html" class="header__logo">MODE</a>
      <nav class="header__nav" aria-label="Головне меню">
        <ul class="header__list">
          <li class="header__item"><a href="../index.html" class="header__link">Головна</a></li>
          <li class="header__item header__item_has-dropdown">
            <a href="../catalog/index.html" class="header__link">Каталог</a>
            <ul class="header__dropdown">
              <li class="header__dropdown-item"><a href="../catalog/index.html#dresses" class="header__dropdown-link">Сукні</a></li>
              <li class="header__dropdown-item"><a href="../catalog/index.html#shirts" class="header__dropdown-link">Сорочки</a></li>
              <li class="header__dropdown-item"><a href="../catalog/index.html#tshirts" class="header__dropdown-link">Футболки</a></li>
            </ul>
          </li>
          <li class="header__item"><a href="index.html" class="header__link header__link_active">Реєстрація</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <h1 class="page-hero__title">Акаунт</h1>
      <p class="page-hero__sub">Приєднуйтесь до нашої спільноти</p>
    </section>

    <section class="register">
      <div class="register__layout">
        
        <div class="register__form-wrap">
          <h2 class="register__form-heading">Створити акаунт</h2>
          <form class="register__form" action="#" method="post">
            <fieldset class="register__form-group">
              <div class="register__field-wrap">
                <label for="name" class="register__field-label">Ім'я</label>
                <input type="text" id="name" class="register__field-input" placeholder="Олена Ковальчук" required minlength="2" />
              </div>
              <div class="register__field-wrap">
                <label for="email" class="register__field-label">Email</label>
                <input type="email" id="email" class="register__field-input" placeholder="example@email.com" required />
              </div>
              <div class="register__field-wrap">
                <label for="tel" class="register__field-label">Телефон</label>
                <input type="tel" id="tel" class="register__field-input" placeholder="+380XXXXXXXXX" pattern="\+380[0-9]{9}" required />
              </div>
              <div class="register__field-wrap">
                <label for="social" class="register__field-label">Instagram/TikTok (URL)</label>
                <input type="url" id="social" class="register__field-input" placeholder="https://instagram.com/username" />
              </div>
              <div class="register__field-wrap">
                <label for="visit" class="register__field-label">Дата візиту</label>
                <input type="datetime-local" id="visit" class="register__field-input" required />
              </div>
              <div class="register__field-wrap">
                <label for="pass" class="register__field-label">Пароль</label>
                <input type="password" id="pass" class="register__field-input" placeholder="********" required minlength="8" />
              </div>
            </fieldset>
            <button type="submit" class="btn btn_type_primary">Зареєструватись</button>
          </form>
        </div>

        <aside class="register__form-wrap register__form-wrap_type_aside" id="login-box">
          <h2 class="register__form-heading">Вхід</h2>
          <form class="register__form">
            <div class="register__field-wrap">
              <label for="l-email" class="register__field-label">Email</label>
              <input type="email" id="l-email" class="register__field-input" required />
            </div>
            <div class="register__field-wrap">
              <label for="l-pass" class="register__field-label">Пароль</label>
              <input type="password" id="l-pass" class="register__field-input" required />
            </div>
            <button type="submit" class="btn btn_type_primary">Увійти</button>
          </form>
        </aside>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__logo">MODE</p>
      <p class="footer__tagline">Якісний жіночий одяг · Україна · 2026</p>
      <nav class="footer__nav" aria-label="Меню підвалу">
        <ul class="footer__list">
          <li class="footer__item"><a href="../index.html" class="footer__link">Головна</a></li>
          <li class="footer__item"><a href="../catalog/index.html" class="footer__link">Каталог</a></li>
          <li class="footer__item"><a href="index.html" class="footer__link">Реєстрація</a></li>
        </ul>
      </nav>
      <p class="footer__copy">© 2026 MODE. Виготовлено в Україні.</p>
    </div>
  </footer>

</body>
</html>
